<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Zettelkasten</title>

  <!-- @@FONT_LINKS@@ -->

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    canvas { touch-action: none; }
    .textLayer, .textLayer * { touch-action: auto !important; }
    button { touch-action: manipulation; }

    html {
      height: 100%; width: 100%; overflow: hidden;
      /* iOS Safari: gebruik fill-available zodat de hoogte VAST is */
      height: -webkit-fill-available;
    }
    body {
      height: 100%; width: 100%; overflow: hidden;
      height: -webkit-fill-available;
      /* Voorkom dat iOS Safari de pagina scrollt */
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
    }
    #root {
      width: 100%; overflow: hidden;
      background: #1c1c1c; color: #e3e0d7;
      font-family: 'DM Sans', 'Segoe UI', system-ui, sans-serif;
      font-size: 15px;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      /* Vaste hoogte — adresbalk kan niet de layout verschuiven */
      height: 100%;
    }

    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #3a4046; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #4a5058; }

    .textLayer {
      position: absolute !important; inset: 0 !important;
      overflow: hidden !important; opacity: 1 !important;
      line-height: 1 !important; user-select: text !important;
      -webkit-user-select: text !important; cursor: text !important;
      pointer-events: auto !important; touch-action: auto !important;
      -webkit-touch-callout: default !important;
    }
    .textLayer span, .textLayer br {
      color: transparent !important; position: absolute !important;
      white-space: pre !important; cursor: text !important;
      transform-origin: 0% 0% !important; user-select: text !important;
      -webkit-user-select: text !important; pointer-events: auto !important;
    }
    .textLayer ::selection { background: rgba(234,231,136,0.5) !important; color: transparent !important; }
    .textLayer ::-webkit-selection { background: rgba(234,231,136,0.5) !important; color: transparent !important; }

    .goyo-mode .sidebar, .goyo-mode .meta-panel, .goyo-mode .top-bar-tabs { display: none !important; }
    .goyo-mode .editor-wrap { max-width: 680px; margin: 0 auto; padding: 40px 60px; }

    .limelight-mode .mdv p:not(.limelight-focus),
    .limelight-mode .mdv li:not(.limelight-focus) { opacity: .25; transition: opacity .2s; }

    /* Markdown */
    .mdv h1 { font-size: 1.2rem; font-weight: 600; color: #ffffd7; margin: 0 0 14px; border-bottom: 1px solid #3a4046; padding-bottom: 6px; }
    .mdv h2 { font-size: 1rem; font-weight: 600; color: #cae682; margin: 18px 0 8px; }
    .mdv h3 { font-size: .9375rem; font-weight: 500; color: #e3e0d7; margin: 14px 0 6px; }
    .mdv p  { color: #d8d5cc; line-height: 1.85; margin: 0 0 10px; font-size: .9375rem; }
    .mdv ul, .mdv ol { padding-left: 22px; margin: 6px 0 10px; }
    .mdv li { color: #d8d5cc; line-height: 1.8; font-size: .9375rem; margin-bottom: 3px; }
    .mdv strong { color: #ffffd7; font-weight: 600; }
    .mdv em { color: #a0a8b0; font-style: italic; }
    .mdv code { background: rgba(255,255,255,.07); padding: 1px 6px; border-radius: 4px; font-size: .9375rem; color: #cae682; font-family: 'Hack', monospace; border: 1px solid rgba(255,255,255,.06); }
    .mdv pre  { background: rgba(0,0,0,.35); padding: 12px 14px; border-radius: 6px; margin: 10px 0; overflow-x: auto; border: 1px solid rgba(255,255,255,.06); border-left: 3px solid #3a4046; }
    .mdv pre code { background: none; padding: 0; font-size: .9375rem; color: #cae682; border: none; }
    .mdv blockquote { border-left: 3px solid #e5786d; padding: 4px 12px; margin: 10px 0; background: rgba(229,120,109,.07); color: #a0a8b0; font-style: italic; border-radius: 0 4px 4px 0; }
    .mdv table { border-collapse: collapse; width: 100%; margin: 10px 0; font-size: .9375rem; }
    .mdv th { background: rgba(255,255,255,.06); color: #8ac6f2; padding: 6px 10px; border: 1px solid #3a4046; text-align: left; font-weight: 500; }
    .mdv td { padding: 5px 10px; border: 1px solid #3a4046; }
    .mdv tr:nth-child(even) td { background: rgba(255,255,255,.02); }
    .mdv hr { border: none; border-top: 1px solid #3a4046; margin: 18px 0; }
    .mdv a { color: #8ac6f2; text-decoration: underline; text-decoration-color: rgba(138,198,242,.3); text-underline-offset: 2px; transition: color .12s; }
    .mdv a:hover { color: #ffffd7; text-decoration-color: rgba(255,255,215,.4); }
    .mdv a:visited { color: #8ac6f2; }
    .mdv p:last-child:has(a[href^="http"]) { margin-top: 18px; padding-top: 12px; border-top: 1px solid #3a4046; font-size: .875rem; color: #857b6f; }
    .zlink {
      color: #8ac6f2;
      cursor: pointer;
      text-decoration: none;
      font-size: .9375rem;
      background: rgba(138,198,242,0.08);
      border: 1px solid rgba(138,198,242,0.2);
      border-radius: 4px;
      padding: 1px 6px;
      white-space: nowrap;
      transition: all .15s;
      display: inline-flex;
      align-items: center;
      gap: 3px;
    }
    .zlink::before { content: "[["; font-size: 10px; opacity: 0.5; }
    .zlink::after  { content: "]]"; font-size: 10px; opacity: 0.5; }
    .zlink:hover { background: rgba(138,198,242,0.16); border-color: rgba(138,198,242,0.45); color: #ffffd7; }
    .zlink.broken { color: #e5786d; background: rgba(229,120,109,0.08); border-color: rgba(229,120,109,0.2); }
    .zlink.broken::before { content: "✗ "; font-size: 10px; opacity: 0.7; }
    .zlink.broken::after  { content: ""; }
    .taghl {
      color: #9fca56;
      font-size: .875rem;
      background: rgba(159,202,86,0.08);
      border-radius: 3px;
      padding: 0 4px;
    }
    .spell-error { border-bottom: 2px solid #e5786d; cursor: help; }

    textarea::placeholder, input::placeholder { color: #5a524a; }
    input, textarea, button, select { font-family: 'DM Sans', system-ui, sans-serif; }

    /* ── Scroll helpers ─────────────────────────────────────────────────────── */

    /* Scrollbare flex-child: vult beschikbare ruimte en scrollt */
    /* Scroll helper — wordt nergens meer direct gebruikt maar bewaard voor backwards compat */
    .zk-scroll-flex {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    /* Verouderde klassen — niet meer in gebruik */
    .zk-tab-canvas, .zk-tab-scroll, .zk-tab-notes { flex: 1; min-height: 0; }

    /* ── iPad/iOS Safari fixes ─────────────────────────────────────────────
       Op iOS Safari werkt overflow:auto niet betrouwbaar in flex-kinderen.
       Deze klasse werkt wel: de browser krijgt een expliciete scroll-hint. */
    @supports (-webkit-touch-callout: none) {
      /* Alle overflow:auto containers op iOS krijgen scroll-momentum */
      [style*="overflow-y: auto"],
      [style*="overflowY: auto"] {
        -webkit-overflow-scrolling: touch;
      }

      /* Notitie-preview en lijst: forceer scroll op iOS */
      .sidebar, .sidebar > * {
        -webkit-overflow-scrolling: touch;
      }
    }

    @keyframes ai-pulse { 0%,100%{opacity:1} 50%{opacity:.6} }
    @keyframes ai-dot   { 0%,100%{transform:scale(1)} 50%{transform:scale(.7)} }
    @keyframes fadeIn   { from{opacity:0;transform:translateY(-3px)} to{opacity:1;transform:translateY(0)} }

    /* Modern button base */
    .btn-wombat {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 4px 11px; border-radius: 6px; font-size: 15px;
      border: 1px solid #3a4046; background: transparent;
      color: #857b6f; cursor: pointer; transition: all .12s;
      letter-spacing: .2px; white-space: nowrap; flex-shrink: 0;
      user-select: none;
    }
    .btn-wombat:hover { color: #e3e0d7; border-color: #4a5258; background: rgba(255,255,255,.04); }
    .btn-wombat:active { transform: scale(.97); }
    .btn-wombat.active-blue  { color: #8ac6f2; border-color: rgba(138,198,242,.4); background: rgba(138,198,242,.08); }
    .btn-wombat.active-green { color: #9fca56; border-color: rgba(159,202,86,.4); background: rgba(159,202,86,.1); }
    .btn-wombat.primary      { color: #1c1c1c; border-color: #9fca56; background: #9fca56; font-weight: 600; }
    .btn-wombat.primary:hover { background: #aed464; border-color: #aed464; }
    .btn-wombat.danger       { color: #e5786d; border-color: rgba(229,120,109,.35); }
    .btn-wombat.danger:hover { background: rgba(229,120,109,.1); }

    .snippet-hint {
      position: absolute; background: #2a2a2a; border: 1px solid #3a4046;
      border-radius: 5px; padding: 4px 8px; font-size: 15px; color: #8ac6f2;
      pointer-events: none; z-index: 100; font-family: 'Hack', monospace;
      box-shadow: 0 4px 12px rgba(0,0,0,.5);
    }

    /* Note list items */
    .note-item {
      padding: 7px 10px; cursor: pointer; border-radius: 5px;
      transition: background .1s; border: 1px solid transparent;
      margin: 1px 4px;
    }
    .note-item:hover { background: rgba(255,255,255,.04); }
    .note-item.selected { background: rgba(138,198,242,.09); border-color: rgba(138,198,242,.18); }

    /* Tag pills */
    .tag-pill {
      display: inline-flex; align-items: center; gap: 3px;
      padding: 2px 8px; border-radius: 20px; font-size: 15px;
      background: rgba(159,202,86,.1); border: 1px solid rgba(159,202,86,.28);
      color: #9fca56; letter-spacing: .3px; cursor: default; white-space: nowrap;
      transition: background .1s;
    }
    .tag-pill:hover { background: rgba(159,202,86,.16); }
    .tag-pill button { background: none; border: none; color: inherit; cursor: pointer; padding: 0; opacity: .6; font-size: 15px; line-height: 1; }
    .tag-pill button:hover { opacity: 1; }

    /* Top bar tabs */
    .topbar-tab {
      display: flex; align-items: center; gap: 5px;
      padding: 0 14px; height: 100%; font-size: 15px;
      border: none; border-bottom: 2px solid transparent;
      background: transparent; color: #857b6f; cursor: pointer;
      letter-spacing: .5px; transition: color .12s, background .12s;
      white-space: nowrap; flex-shrink: 0;
    }
    .topbar-tab:hover { color: #e3e0d7; background: rgba(255,255,255,.03); }
    .topbar-tab.active { color: #ffffd7; border-bottom-color: #eae788; background: rgba(255,255,255,.05); }
    /* Scrollbare tab-strip: verberg scrollbar maar behoud scroll-functie */
    .tab-scroll-strip { scrollbar-width: none; -ms-overflow-style: none; }
    .tab-scroll-strip::-webkit-scrollbar { display: none; }

    /* Dropdown */
    .wombat-dropdown {
      background: #1c1c1c; border: 1px solid #3a4046; border-radius: 8px;
      box-shadow: 0 8px 32px rgba(0,0,0,.75), 0 2px 8px rgba(0,0,0,.4);
      animation: fadeIn .14s ease-out;
    }

    .scroll-ios { -webkit-overflow-scrolling: touch; overflow-y: auto; }
  </style>

  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#1c1c1c">
</head>
<body>
<div id="root"></div>
<script src="@@PDFJS_SRC@@"></script>
<script>
  if (window.pdfjsLib) {
    pdfjsLib.GlobalWorkerOptions.workerSrc = '@@PDFJS_WORKER@@';
  }
</script>
<script src="@@REACT_SRC@@"></script>
<script src="@@REACT_DOM_SRC@@"></script>
<!-- Stable data-modules: geen UI-globals nodig, laden vroeg -->
<script src="modules/noteApi.js"></script>
<script src="modules/noteStore.js"></script>
<script src="modules/pdfService.js"></script>
<script src="modules/annotationStore.js"></script>
<!-- app.js: definieert W, TagPill, VimEditor, genId etc. -->
<script src="app.js"></script>
<!-- UI-modules: laden NA app.js zodat W, TagPill etc. beschikbaar zijn -->
<script src="modules/NoteList.js"></script>
<script src="modules/SmartLinkSuggester.js"></script>
    <script src="modules/LinksSidebar.js"></script>
<script src="modules/NoteEditor.js"></script>
<script src="modules/NotePreview.js"></script>
<script src="modules/NotesMeta.js"></script>
<script src="modules/TagManager.js"></script>
<script src="modules/NotesTab.js"></script>
<script src="modules/WebImporter.js"></script>
<script src="modules/ReadingList.js"></script>
<script src="modules/StatsPanel.js"></script>
<script src="modules/ReviewPanel.js"></script>
<!-- Bootstrap: mount React NADAT alle modules geladen zijn -->
<script>
  const root = ReactDOM.createRoot(document.getElementById("root"));
  root.render(React.createElement(App));
</script>
</body>
</html>
