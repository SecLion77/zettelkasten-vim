<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Zettelkasten</title>

  <!-- @@FONT_LINKS@@ -->

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    canvas { touch-action: none; }
    .textLayer, .textLayer * { touch-action: auto !important; }
    button { touch-action: manipulation; }

    html {
      height: 100%; width: 100%; overflow: hidden;
      /* iOS Safari: gebruik fill-available zodat de hoogte VAST is */
      height: -webkit-fill-available;
    }
    body {
      height: 100%; width: 100%; overflow: hidden;
      height: -webkit-fill-available;
      /* Voorkom dat iOS Safari de pagina scrollt */
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
    }
    :root {
      --app-font-size: 13px; /* wordt runtime aangepast via JS */
    }
    #root {
      width: 100%; overflow: hidden;
      background: #090d0f; color: #c8deda;
      font-family: 'Hack', 'Courier New', monospace;
      font-size: var(--app-font-size, 13px);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      /* Vaste hoogte — adresbalk kan niet de layout verschuiven */
      height: 100%;
      --fg-muted-readable: #9a9187;   /* verbeterd contrast t.o.v. #857b6f */
    }

    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #1a2428; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #2a3a40; }

    .textLayer {
      position: absolute !important; inset: 0 !important;
      overflow: hidden !important; opacity: 1 !important;
      line-height: 1 !important; user-select: text !important;
      -webkit-user-select: text !important; cursor: text !important;
      pointer-events: auto !important; touch-action: auto !important;
      -webkit-touch-callout: default !important;
    }
    .textLayer span, .textLayer br {
      color: transparent !important; position: absolute !important;
      white-space: pre !important; cursor: text !important;
      transform-origin: 0% 0% !important; user-select: text !important;
      -webkit-user-select: text !important; pointer-events: auto !important;
    }
    .textLayer ::selection { background: rgba(234,231,136,0.5) !important; color: transparent !important; }
    .textLayer ::-webkit-selection { background: rgba(234,231,136,0.5) !important; color: transparent !important; }

    .goyo-mode .sidebar, .goyo-mode .meta-panel, .goyo-mode .top-bar-tabs { display: none !important; }
    .goyo-mode .editor-wrap { max-width: 680px; margin: 0 auto; padding: 40px 60px; }

    .limelight-mode .mdv p:not(.limelight-focus),
    .limelight-mode .mdv li:not(.limelight-focus) { opacity: .25; transition: opacity .2s; }

    /* Markdown */
    .mdv { max-width: 720px; }
    .mdv h1 { font-size: 1.2rem; font-weight: 600; color: #e8f4f2; margin: 0 0 14px; border-bottom: 1px solid #1a2428; padding-bottom: 6px; }
    .mdv h2 { font-size: 1rem; font-weight: 600; color: #a6d189; margin: 18px 0 8px; }
    .mdv h3 { font-size: .9375rem; font-weight: 500; color: #c8deda; margin: 14px 0 6px; }
    .mdv p  { color: #b8d0cc; line-height: 1.9; margin: 0 0 10px; font-size: .9375rem; font-family: 'DM Sans', system-ui, sans-serif; }
    .mdv ul, .mdv ol { padding-left: 22px; margin: 6px 0 10px; }
    .mdv li { color: #b8d0cc; line-height: 1.85; font-size: .9375rem; margin-bottom: 3px; font-family: 'DM Sans', system-ui, sans-serif; }
    .mdv strong { color: #e8f4f2; font-weight: 700; background: rgba(125,216,198,0.06); border-radius: 2px; padding: 0 3px; }
    .mdv em { color: #8ec8c0; font-style: italic; }
    .mdv code { background: rgba(125,216,198,.08); padding: 1px 6px; border-radius: 4px; font-size: .9375rem; color: #7dd8c6; font-family: 'Hack', monospace; border: 1px solid rgba(125,216,198,.12); }
    .mdv pre  { background: rgba(0,0,0,.5); padding: 12px 14px; border-radius: 6px; margin: 10px 0; overflow-x: auto; border: 1px solid rgba(125,216,198,.08); border-left: 3px solid #1a3035; }
    .mdv pre code { background: none; padding: 0; font-size: .9375rem; color: #a6d189; border: none; }
    .mdv blockquote { border-left: 3px solid #f5a97f; padding: 6px 14px; margin: 12px 0; background: rgba(245,169,127,.05); color: #9db8b4; font-style: italic; border-radius: 0 4px 4px 0; font-family: 'DM Sans', system-ui, sans-serif; line-height: 1.7; }
    .mdv table { border-collapse: collapse; width: 100%; margin: 10px 0; font-size: .9375rem; }
    .mdv th { background: rgba(125,216,198,.07); color: #7dd8c6; padding: 6px 10px; border: 1px solid #1a2428; text-align: left; font-weight: 500; }
    .mdv td { padding: 5px 10px; border: 1px solid #1a2428; color: #b8d0cc; }
    .mdv tr:nth-child(even) td { background: rgba(125,216,198,.03); }
    .mdv hr { border: none; border-top: 1px solid #1a2428; margin: 18px 0; }
    .mdv a { color: #7dd8c6; text-decoration: underline; text-decoration-color: rgba(125,216,198,.3); text-underline-offset: 2px; transition: color .12s; }
    .mdv a:hover { color: #e8f4f2; text-decoration-color: rgba(232,244,242,.4); }
    .mdv a:visited { color: #7dd8c6; }
    .mdv p:last-child:has(a[href^="http"]) { margin-top: 18px; padding-top: 12px; border-top: 1px solid #1a2428; font-size: .875rem; color: #4e6a70; }
    .zlink {
      color: #7dd8c6;
      cursor: pointer;
      text-decoration: none;
      font-size: .9375rem;
      background: rgba(125,216,198,0.08);
      border: 1px solid rgba(125,216,198,0.2);
      border-radius: 4px;
      padding: 1px 6px;
      white-space: nowrap;
      transition: all .15s;
      display: inline-flex;
      align-items: center;
      gap: 3px;
    }
    .zlink::before { content: "[["; font-size: 10px; opacity: 0.5; }
    .zlink::after  { content: "]]"; font-size: 10px; opacity: 0.5; }
    .zlink:hover { background: rgba(125,216,198,0.16); border-color: rgba(125,216,198,0.45); color: #e8f4f2; }
    .zlink.broken { color: #f5a97f; background: rgba(245,169,127,0.08); border-color: rgba(245,169,127,0.2); }
    .zlink.broken::before { content: "✗ "; font-size: 10px; opacity: 0.7; }
    .zlink.broken::after  { content: ""; }
    .taghl {
      color: #a6d189;
      font-size: .875rem;
      background: rgba(166,209,137,0.08);
      border-radius: 3px;
      padding: 0 4px;
    }
    .spell-error { border-bottom: 2px solid #f5a97f; cursor: help; }

    textarea::placeholder, input::placeholder { color: #5a524a; }
    input, textarea, button, select { font-family: 'Hack', 'Courier New', monospace; }

    /* ── Scroll helpers ─────────────────────────────────────────────────────── */

    /* Scrollbare flex-child: vult beschikbare ruimte en scrollt */
    /* Scroll helper — wordt nergens meer direct gebruikt maar bewaard voor backwards compat */
    .zk-scroll-flex {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    /* Verouderde klassen — niet meer in gebruik */
    .zk-tab-canvas, .zk-tab-scroll, .zk-tab-notes { flex: 1; min-height: 0; }

    /* ── iPad/iOS Safari fixes ─────────────────────────────────────────────
       Op iOS Safari werkt overflow:auto niet betrouwbaar in flex-kinderen.
       Deze klasse werkt wel: de browser krijgt een expliciete scroll-hint. */
    @supports (-webkit-touch-callout: none) {
      /* Alle overflow:auto containers op iOS krijgen scroll-momentum */
      [style*="overflow-y: auto"],
      [style*="overflowY: auto"] {
        -webkit-overflow-scrolling: touch;
      }

      /* Notitie-preview en lijst: forceer scroll op iOS */
      .sidebar, .sidebar > * {
        -webkit-overflow-scrolling: touch;
      }
    }

    @keyframes ai-pulse { 0%,100%{opacity:1} 50%{opacity:.6} }
    @keyframes ai-dot   { 0%,100%{transform:scale(1)} 50%{transform:scale(.7)} }
    @keyframes fadeIn      { from{opacity:0;transform:translateY(-3px)} to{opacity:1;transform:translateY(0)} }
    @keyframes slideInRight { from{opacity:0;transform:translateX(24px)} to{opacity:1;transform:translateX(0)} }

    /* Modern button base */
    .btn-wombat {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 4px 11px; border-radius: 6px; font-size: var(--app-font-size, 13px);
      border: 1px solid #1a2428; background: transparent;
      color: #4e6a70; cursor: pointer; transition: all .12s;
      letter-spacing: .2px; white-space: nowrap; flex-shrink: 0;
      user-select: none;
    }
    .btn-wombat:hover { color: #c8deda; border-color: #2a3a40; background: rgba(125,216,198,.04); }
    .btn-wombat:active { transform: scale(.97); }
    .btn-wombat.active-blue  { color: #7dd8c6; border-color: rgba(125,216,198,.4); background: rgba(125,216,198,.08); }
    .btn-wombat.active-green { color: #a6d189; border-color: rgba(166,209,137,.4); background: rgba(166,209,137,.1); }
    .btn-wombat.primary      { color: #090d0f; border-color: #7dd8c6; background: #7dd8c6; font-weight: 600; }
    .btn-wombat.primary:hover { background: #aed464; border-color: #aed464; }
    .btn-wombat.danger       { color: #f5a97f; border-color: rgba(245,169,127,.35); }
    .btn-wombat.danger:hover { background: rgba(229,120,109,.1); }

    .snippet-hint {
      position: absolute; background: #0a0e10; border: 1px solid #1a2428;
      border-radius: 5px; padding: 4px 8px; font-size: 15px; color: #7dd8c6;
      pointer-events: none; z-index: 100; font-family: 'Hack', monospace;
      box-shadow: 0 4px 12px rgba(0,0,0,.5);
    }

    /* Note list items */
    .note-item {
      cursor: pointer;
      transition: background .12s;
    }
    .note-item:hover { background: rgba(255,255,255,.05); }
    .note-item:hover .pin-btn { opacity: 0.35 !important; }
    .note-item:hover .pin-btn:hover { opacity: 1 !important; }

    /* Consistente sidebar toggle knoppen */
    .sidebar-toggle-btn:hover {
      background: rgba(255,255,255,0.06) !important;
      color: var(--fg, #c8deda) !important;
    }
    .sidebar-toggle-btn:active { transform: scale(0.95); }
    .note-item.selected { background: rgba(125,216,198,.08); }

    /* Tag pills */
    .tag-pill {
      display: inline-flex; align-items: center; gap: 3px;
      padding: 2px 8px; border-radius: 20px; font-size: var(--app-font-size, 13px);
      background: rgba(245,169,127,.09); border: 1px solid rgba(245,169,127,.25);
      color: #f5a97f; letter-spacing: .3px; cursor: default; white-space: nowrap;
      transition: background .1s;
    }
    .tag-pill:hover { background: rgba(245,169,127,.16); }
    .tag-pill button { background: none; border: none; color: inherit; cursor: pointer; padding: 0; opacity: .6; font-size: var(--app-font-size, 13px); line-height: 1; }
    .tag-pill button:hover { opacity: 1; }

    /* Top bar tabs */
    .topbar-tab {
      display: flex; align-items: center; gap: 5px;
      padding: 0 14px; height: 100%; font-size: 13px;
      border: none; border-bottom: 2px solid transparent;
      background: transparent;
      /* Duidelijk leesbaar maar niet te fel: 5.5:1 contrast */
      color: #5a7a80;
      cursor: pointer; letter-spacing: .2px;
      transition: color .1s, background .1s;
      white-space: nowrap; flex-shrink: 0;
      position: relative;
    }
    .topbar-tab:hover {
      color: #9db8b4;
      background: rgba(125,216,198,.04);
    }
    .topbar-tab.active {
      color: #e8f4f2;
      border-bottom: 2px solid #7dd8c6;
      background: rgba(125,216,198,.07);
      font-weight: 500;
    }
    /* Scrollbare tab-strip: verberg scrollbar maar behoud scroll-functie */
    .tab-scroll-strip { scrollbar-width: none; -ms-overflow-style: none; }
    .tab-scroll-strip::-webkit-scrollbar { display: none; }

    /* Dropdown */
    .wombat-dropdown {
      background: #050708; border: 1px solid #1a2428; border-radius: 8px;
      box-shadow: 0 8px 32px rgba(0,0,0,.85), 0 2px 8px rgba(0,0,0,.5);
      animation: fadeIn .14s ease-out;
    }

    .scroll-ios { -webkit-overflow-scrolling: touch; overflow-y: auto; }
  </style>

  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#090d0f">
  <script>
    // Herstel font-size uit localStorage vóór eerste render (voorkomt FOUC)
    (function() {
      const saved = localStorage.getItem('zk_font_size');
      const size = saved ? Math.max(11, Math.min(18, parseInt(saved))) : 13;
      document.documentElement.style.setProperty('--app-font-size', size + 'px');
    })();
  </script>
</head>
<body>
<div id="root"></div>
<script src="@@PDFJS_SRC@@"></script>
<script>
  if (window.pdfjsLib) {
    pdfjsLib.GlobalWorkerOptions.workerSrc = '@@PDFJS_WORKER@@';
  }
</script>
<script src="@@REACT_SRC@@"></script>
<script src="@@REACT_DOM_SRC@@"></script>
<!-- Stable data-modules: geen UI-globals nodig, laden vroeg -->
<script src="modules/noteApi.js"></script>
<script src="modules/noteStore.js"></script>
<script src="modules/pdfService.js"></script>
<script src="modules/annotationStore.js"></script>
<!-- app.js: globals, constants, api, renderMd, TagPill, TagEditor -->
<script src="app.js"></script>
<!-- Engines: geen UI-deps -->
<script src="modules/SpellEngine.js"></script>
<!-- VimEditor: SpellEngine + CompletionEngine dep -->
<script src="modules/VimEditor.js"></script>
<!-- Graph hulpcomponent -->
<script src="modules/TagFilterBar.js"></script>
<script src="modules/Graph.js"></script>
<!-- PDF viewer -->
<script src="modules/PDFViewer.js"></script>
<!-- Instellingen -->
<script src="modules/VaultSettings.js"></script>
<!-- Afbeeldingen -->
<script src="modules/ImagesGallery.js"></script>
<!-- Mermaid, MindMap, LLMNotebook, FuzzySearch -->
<script src="modules/MermaidEditor.js"></script>
<!-- Model picker -->
<script src="modules/ModelPicker.js"></script>
<!-- Overige UI-modules: laden NA app.js zodat W, TagPill etc. beschikbaar zijn -->
<script src="modules/NoteList.js"></script>
<script src="modules/SmartLinkSuggester.js"></script>
    <script src="modules/LinksSidebar.js"></script>
<script src="modules/NoteEditor.js"></script>
<script src="modules/NotePreview.js"></script>
<script src="modules/NotesMeta.js"></script>
<script src="modules/TagManager.js"></script>
<script src="modules/NotesTab.js"></script>
<script src="modules/WebImporter.js"></script>
<script src="modules/ReadingList.js"></script>
<script src="modules/StatsPanel.js"></script>
<script src="modules/ReviewPanel.js"></script>
<script src="modules/Whiteboard.js"></script>
<!-- Bootstrap: mount React NADAT alle modules geladen zijn -->
<script>
  const root = ReactDOM.createRoot(document.getElementById("root"));
  root.render(React.createElement(App));
</script>
</body>
</html>
